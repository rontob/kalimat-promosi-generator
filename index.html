<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Footer Text</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
    }
    h2 {
      text-align: center;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 15px;
    }
    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover {
      background: #16a34a;
    }
    .radio-group {
      max-height: 200px;
      overflow-y: auto;
      background: #020617;
      padding: 10px;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
    }
    textarea {
      width: 100%;
      height: 100px;
      border-radius: 8px;
      border: none;
      padding: 10px;
      resize: none;
      background: #020617;
      color: white;
    }
    .copy-btn {
      background: #3b82f6;
    }
    .copy-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Generator Footer Text</h2>

  <input type="text" id="urlInput" placeholder="Masukkan URL...">

  <button onclick="generateRandom()">🎲 Generate Random</button>

  <h3>Pilih Kalimat Manual:</h3>
  <div class="radio-group" id="radioContainer"></div>

  <div class="result" id="resultBox" style="display:none;">
    <h3>Hasil:</h3>
    <textarea id="resultText" readonly></textarea>
    <button class="copy-btn" onclick="copyText()">📋 Copy</button>
  </div>
</div>

<script>
  const texts = [
    "Jangan lewatkan kesempatan ini!",
    "Klik link di bawah untuk info lengkap.",
    "Solusi terbaik untuk kamu.",
    "Mulai sekarang, ubah hidupmu.",
    "Akses eksklusif hanya di sini.",
    "Temukan rahasia sukses di sini.",
    "Langkah kecil, hasil besar.",
    "Kesempatan terbatas!",
    "Jangan sampai ketinggalan.",
    "Upgrade hidupmu sekarang.",
    "Cara mudah hasil maksimal.",
    "Mulai perjalanan suksesmu.",
    "Satu klik menuju perubahan.",
    "Info penting ada di sini.",
    "Jangan ragu, coba sekarang.",
    "Waktunya bertindak!",
    "Solusi praktis untuk kamu.",
    "Klik sekarang juga.",
    "Rahasia ada di link ini.",
    "Langsung cek di sini."
  ];

  const radioContainer = document.getElementById("radioContainer");

  // Generate radio buttons
  texts.forEach((text) => {
    const label = document.createElement("label");
    label.innerHTML = `
      <input type="radio" name="textOption" value="${text}" onchange="generateFromRadio(this.value)">
      ${text}
    `;
    radioContainer.appendChild(label);
  });

  function generateRandom() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) {
      alert("Masukkan URL dulu!");
      return;
    }

    const randomText = texts[Math.floor(Math.random() * texts.length)];
    showResult(randomText, url);
  }

  function generateFromRadio(selectedText) {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) {
      alert("Masukkan URL dulu!");
      return;
    }

    showResult(selectedText, url);
  }

  function showResult(text, url) {
    const finalText = text + " " + url;
    document.getElementById("resultText").value = finalText;
    document.getElementById("resultBox").style.display = "block";
  }

  function copyText() {
    const textarea = document.getElementById("resultText");
    textarea.select();
    textarea.setSelectionRange(0, 99999);

    document.execCommand("copy");

    alert("Text berhasil di-copy!");
  }
</script>

</body>
</html>
